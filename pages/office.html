<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Office — Attendance Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css"/>
</head>
<body>
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="white" width="22" height="22">
          <path d="M17 12h-5v5h5v-5zM16 1v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-1V1h-2zm3 18H5V8h14v11z"/>
        </svg>
      </div>
      <span>AttendanceDB</span>
    </div>

    <nav class="sidebar-nav">
      <a class="nav-link" data-page="home" href="home.html">
        <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        All Offices
      </a>
      <div class="nav-section-label">Offices</div>
      <div id="sidebarOffices" class="sidebar-offices"></div>
    </nav>

    <div class="sidebar-footer">
      <button class="logout-btn" onclick="logout()">
        <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5-5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
        Sign out
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <header class="page-header">
      <div>
        <a href="home.html" class="back-link">← All Offices</a>
        <h1 class="page-title" id="officeTitle">Loading…</h1>
        <p class="page-sub" id="officeMeta"></p>
      </div>
      <button class="refresh-btn" onclick="loadData()">
        <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
        Refresh
      </button>
    </header>

    <!-- TAB BAR -->
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="daily"   onclick="switchTab('daily')">Daily Summary</button>
      <button class="tab-btn"        data-tab="totals"  onclick="switchTab('totals')">Staff Totals</button>
      <button class="tab-btn"        data-tab="months"  onclick="switchTab('months')">Monthly Breakdown</button>
      <button class="tab-btn"        data-tab="monthly" onclick="switchTab('monthly')">Monthly Totals</button>
    </div>

    <!-- SEARCH BAR -->
    <div class="table-toolbar">
      <input type="search" id="tableSearch" placeholder="Search in table…" oninput="filterTable(this.value)" />
      <span id="rowCount" class="row-count"></span>
    </div>

    <!-- TABLE PANELS -->
    <div id="panel-daily"   class="tab-panel active"><div class="loading-wrap"><div class="spinner"></div></div></div>
    <div id="panel-totals"  class="tab-panel"></div>
    <div id="panel-months"  class="tab-panel"></div>
    <div id="panel-monthly" class="tab-panel"></div>
  </main>

  <script src="app.js"></script>
  <script>
    requireAuth();

    const params = new URLSearchParams(window.location.search);
    const OFFICE = params.get("office") || "";
    let activeTab = "daily";
    let officeData = null;

    if (!OFFICE) window.location.href = "home.html";

    // ── Load sidebar offices ──────────────────────────
    async function loadSidebar() {
      try {
        const offices = await apiFetch("/offices");
        const el = document.getElementById("sidebarOffices");
        el.innerHTML = offices.map(o => `
          <a class="nav-link ${o.slug === OFFICE ? "active" : ""}" href="office.html?office=${o.slug}">
            <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M12 7V3H2v18h20V7H12zM6 19H4v-2h2v2zm0-4H4v-2h2v2zm0-4H4V9h2v2zm0-4H4V5h2v2zm4 12H8v-2h2v2zm0-4H8v-2h2v2zm0-4H8V9h2v2zm0-4H8V5h2v2zm10 12h-8v-2h2v-2h-2v-2h2v-2h-2V9h8v10zm-2-8h-2v2h2v-2zm0 4h-2v2h2v-2z"/></svg>
            ${o.name}
          </a>
        `).join("");
      } catch {}
    }

    // ── Load office data ──────────────────────────────
    async function loadData() {
      document.getElementById("officeTitle").textContent = OFFICE.replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());
      document.getElementById("officeMeta").textContent = "Loading…";
      ["daily","totals","months","monthly"].forEach(t => {
        document.getElementById(`panel-${t}`).innerHTML = `<div class="loading-wrap"><div class="spinner"></div></div>`;
      });

      try {
        officeData = await apiFetch(`/offices/${OFFICE}`);
        document.getElementById("officeTitle").textContent = officeData.name;
        document.getElementById("officeMeta").textContent = `Last updated: ${fmtDate(officeData.last_updated)}`;

        renderTab("daily",   officeData.cleaned_daily);
        renderTab("totals",  officeData.cleaned_totals);
        renderTab("months",  officeData.cleaned_months);
        renderTab("monthly", officeData.cleaned_monthly);

        updateRowCount();
      } catch (e) {
        document.getElementById("officeTitle").textContent = OFFICE.replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());
        document.getElementById("panel-daily").innerHTML = `<p class="empty-state error-text">Could not load data: ${e.message}</p>`;
      }
    }

    function renderTab(name, data) {
      document.getElementById(`panel-${name}`).innerHTML = dfToTable(data, `tbl-${name}`);
    }

    // ── Tab switching ─────────────────────────────────
    function switchTab(tab) {
      activeTab = tab;
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.toggle("active", b.dataset.tab === tab));
      document.querySelectorAll(".tab-panel").forEach(p => p.classList.toggle("active", p.id === `panel-${tab}`));
      document.getElementById("tableSearch").value = "";
      filterTable("");
      updateRowCount();
    }

    // ── Table search / filter ─────────────────────────
    function filterTable(query) {
      const tbl = document.getElementById(`tbl-${activeTab}`);
      if (!tbl) return;
      const q = query.toLowerCase();
      let visible = 0;
      tbl.querySelectorAll("tbody tr").forEach(row => {
        const match = row.textContent.toLowerCase().includes(q);
        row.style.display = match ? "" : "none";
        if (match) visible++;
      });
      document.getElementById("rowCount").textContent = query ? `${visible} result${visible !== 1 ? "s" : ""}` : "";
    }

    function updateRowCount() {
      const tbl = document.getElementById(`tbl-${activeTab}`);
      if (!tbl) return;
      const total = tbl.querySelectorAll("tbody tr").length;
      document.getElementById("rowCount").textContent = `${total} row${total !== 1 ? "s" : ""}`;
    }

    // ── Boot ──────────────────────────────────────────
    loadSidebar();
    loadData();
  </script>
</body>
</html>
