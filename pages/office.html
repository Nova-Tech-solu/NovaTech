<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>All Offices — Attendance Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css"/>
</head>
<body>
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="white" width="22" height="22">
          <path d="M17 12h-5v5h5v-5zM16 1v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-1V1h-2zm3 18H5V8h14v11z"/>
        </svg>
      </div>
      <span>AttendanceDB</span>
    </div>

    <nav class="sidebar-nav">
      <a class="nav-link active" data-page="home" href="home.html">
        <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        All Offices
      </a>
      <div class="nav-section-label">Offices</div>
      <div id="sidebarOffices" class="sidebar-offices">
        <div class="skeleton-line"></div>
        <div class="skeleton-line"></div>
        <div class="skeleton-line"></div>
      </div>
    </nav>

    <div class="sidebar-footer">
      <button class="logout-btn" onclick="logout()">
        <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5-5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
        Sign out
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <header class="page-header">
      <div>
        <h1 class="page-title">Office Overview</h1>
        <p class="page-sub">Select an office to view its attendance records.</p>
      </div>
      <button class="refresh-btn" onclick="loadOffices()">
        <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
        Refresh
      </button>
    </header>

    <div id="officeGrid" class="office-grid">
      <!-- populated by JS -->
    </div>
  </main>

  <script src="app.js"></script>
  <script>
    requireAuth();

    async function loadOffices() {
      const grid = document.getElementById("officeGrid");
      const sidebar = document.getElementById("sidebarOffices");
      grid.innerHTML = `<div class="loading-wrap"><div class="spinner"></div><p>Loading offices…</p></div>`;

      try {
        const offices = await apiFetch("/offices");

        if (!offices.length) {
          grid.innerHTML = `<p class="empty-state">No offices registered yet. Contact the system administrator.</p>`;
          return;
        }

        // Sidebar links
        sidebar.innerHTML = offices.map(o => `
          <a class="nav-link" data-page="${o.slug}" href="office.html?office=${o.slug}">
            <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M12 7V3H2v18h20V7H12zM6 19H4v-2h2v2zm0-4H4v-2h2v2zm0-4H4V9h2v2zm0-4H4V5h2v2zm4 12H8v-2h2v2zm0-4H8v-2h2v2zm0-4H8V9h2v2zm0-4H8V5h2v2zm10 12h-8v-2h2v-2h-2v-2h2v-2h-2V9h8v10zm-2-8h-2v2h2v-2zm0 4h-2v2h2v-2z"/></svg>
            ${o.name}
          </a>
        `).join("");

        // Cards
        grid.innerHTML = offices.map(o => `
          <a class="office-card ${o.has_data ? "" : "no-data"}" href="office.html?office=${o.slug}">
            <div class="office-card-icon">
              <svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24"><path d="M12 7V3H2v18h20V7H12zM6 19H4v-2h2v2zm0-4H4v-2h2v2zm0-4H4V9h2v2zm0-4H4V5h2v2zm4 12H8v-2h2v2zm0-4H8v-2h2v2zm0-4H8V9h2v2zm0-4H8V5h2v2zm10 12h-8v-2h2v-2h-2v-2h2v-2h-2V9h8v10zm-2-8h-2v2h2v-2zm0 4h-2v2h2v-2z"/></svg>
            </div>
            <div class="office-card-body">
              <h2>${o.name}</h2>
              <p class="office-meta">
                ${o.has_data
                  ? `<span class="badge badge-active">Data available</span> Last updated: ${fmtDate(o.last_updated)}`
                  : `<span class="badge badge-empty">Awaiting upload</span>`
                }
              </p>
            </div>
            <svg class="office-arrow" viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg>
          </a>
        `).join("");

      } catch (e) {
        grid.innerHTML = `<p class="empty-state error-text">Failed to load offices: ${e.message}</p>`;
      }
    }

    loadOffices();
  </script>
</body>
</html>
