<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Attendance Dashboard — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --border:    #30363d;
      --accent:    #2563eb;
      --accent-h:  #1d4ed8;
      --text:      #e6edf3;
      --muted:     #8b949e;
      --error:     #f85149;
      --success:   #3fb950;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .login-wrap {
      width: 100%;
      max-width: 400px;
    }

    .brand {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .brand-icon {
      width: 52px;
      height: 52px;
      background: var(--accent);
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1rem;
    }

    .brand-icon svg { width: 28px; height: 28px; fill: #fff; }

    .brand h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .brand p {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 0.35rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    input[type="password"] {
      width: 100%;
      padding: 0.75rem 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="password"]:focus { border-color: var(--accent); }

    .btn {
      display: block;
      width: 100%;
      margin-top: 1.25rem;
      padding: 0.8rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn:hover { background: var(--accent-h); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .error-msg {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      background: rgba(248,81,73,0.1);
      border: 1px solid rgba(248,81,73,0.3);
      border-radius: 8px;
      color: var(--error);
      font-size: 0.85rem;
      display: none;
    }

    .footer-note {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.78rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M17 12h-5v5h5v-5zM16 1v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-1V1h-2zm3 18H5V8h14v11z"/>
        </svg>
      </div>
      <h1>Attendance Dashboard</h1>
      <p>Institutional staff attendance monitoring</p>
    </div>

    <div class="card">
      <label for="password">Access Password</label>
      <input type="password" id="password" placeholder="Enter dashboard password" autocomplete="current-password" />
      <button class="btn" id="loginBtn" onclick="doLogin()">Sign In</button>
      <div class="error-msg" id="errMsg">Incorrect password. Please try again.</div>
    </div>

    <p class="footer-note">Contact your system administrator for access.</p>
  </div>

  <script>
    // ← Set this to your Render/Railway backend URL
    const API_BASE = "https://attendance-api-blyk.onrender.com";

    // Check if already logged in
    if (sessionStorage.getItem("das_auth") === "1") {
      window.location.href = "pages/home.html";
    }

    document.getElementById("password").addEventListener("keydown", e => {
      if (e.key === "Enter") doLogin();
    });

    async function doLogin() {
      const pw = document.getElementById("password").value.trim();
      const btn = document.getElementById("loginBtn");
      const err = document.getElementById("errMsg");
      if (!pw) return;

      btn.disabled = true;
      btn.textContent = "Signing in…";
      err.style.display = "none";

      try {
        const res = await fetch(`${API_BASE}/auth/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password: pw }),
        });
        if (res.ok) {
          sessionStorage.setItem("das_auth", "1");
          window.location.href = "pages/home.html";
        } else {
          err.style.display = "block";
        }
      } catch {
        err.textContent = "Cannot reach server. Check your connection.";
        err.style.display = "block";
      } finally {
        btn.disabled = false;
        btn.textContent = "Sign In";
      }
    }
  </script>
</body>
</html>
